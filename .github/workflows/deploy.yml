name: Deploy to Staging

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID_SHARED }}
  REGION: europe-west2
  REPOSITORY: risefit-knowledge-graph
  SERVICE_NAME: risefit-knowledge-graph
  INFRA_REPO: dongw1023/risefit-infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        target: [server, ingest]

    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_SHARED }}
          service_account: ${{ secrets.GCP_SA_EMAIL_SHARED }}

      # Configure Docker
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Build and Push image
      - name: Build and Push Docker Image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}-${{ matrix.target }}:${{ github.sha }}"
          docker build --target ${{ matrix.target }} -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

  update-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Code (for env context)
        uses: actions/checkout@v4

      # Checkout the infrastructure repository
      - name: Checkout Infrastructure Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          path: risefit-infra
          ssh-key: ${{ secrets.INFRA_DEPLOY_KEY }}
          fetch-depth: 1

      - name: Update and Commit Infrastructure Configuration
        run: |
          # --- Configuration ---
          TARGET_ENV="staging"
          NEW_TAG="${{ github.sha }}"
          
          cd risefit-infra
          
          # risefit-knowledge-graph -> risefit_knowledge_graph
          BASE_VAR_NAME="${{ env.SERVICE_NAME }}"
          BASE_VAR_NAME="${BASE_VAR_NAME//-/_}"
          
          TFVARS_FILE="$TARGET_ENV/terraform.tfvars"
          
          echo "Updating image tags in $TFVARS_FILE to $NEW_TAG"
          
          # Update both server and ingest tags
          sed -i "s/^${BASE_VAR_NAME}_server_image_tag.*/${BASE_VAR_NAME}_server_image_tag = \"$NEW_TAG\"/" "$TFVARS_FILE"
          sed -i "s/^${BASE_VAR_NAME}_ingest_image_tag.*/${BASE_VAR_NAME}_ingest_image_tag = \"$NEW_TAG\"/" "$TFVARS_FILE"
          
          echo "Updated $TFVARS_FILE content:"
          cat "$TFVARS_FILE"

          # Configure git and commit
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add "$TFVARS_FILE"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ${{ env.SERVICE_NAME }} images in $TARGET_ENV to $NEW_TAG"
            git push
          fi
