name: Build, Push, and Update Infrastructure File

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west2
  REPOSITORY: risefit-knowledge-graph
  SERVICE_NAME: risefit-knowledge-graph
  INFRA_REPO: dongw1023/risefit-infra

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    strategy:
      matrix:
        target: [server, ingest]
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker
      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build and Push image using the specific target from Dockerfile
      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}-${{ matrix.target }}"
          docker build --target ${{ matrix.target }} -t "$IMAGE_PATH:${{ github.sha }}" -t "$IMAGE_PATH:latest" .
          docker push "$IMAGE_PATH:${{ github.sha }}"
          docker push "$IMAGE_PATH:latest"

  update-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infrastructure Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          ssh-key: ${{ secrets.INFRA_DEPLOY_KEY }}

      - name: Update and Commit Infrastructure Configuration
        run: |
          TARGET_ENV="staging"
          NEW_TAG="${{ github.sha }}"
          TFVARS_FILE="$TARGET_ENV/terraform.tfvars"
          
          # Use SERVICE_NAME prefix for TF vars (convert - to _)
          # Example: risefit_knowledge_graph_server_image_tag
          PREFIX="${{ env.SERVICE_NAME }}"
          PREFIX="${PREFIX//-/_}"
          
          sed -i "s/^${PREFIX}_server_image_tag.*/${PREFIX}_server_image_tag = \"$NEW_TAG\"/" "$TFVARS_FILE"
          sed -i "s/^${PREFIX}_ingest_image_tag.*/${PREFIX}_ingest_image_tag = \"$NEW_TAG\"/" "$TFVARS_FILE"
          
          echo "Updated $TFVARS_FILE content:"
          cat "$TFVARS_FILE"
          
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'
          git add "$TFVARS_FILE"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update risefit images in $TARGET_ENV to $NEW_TAG"
            git push
          fi
